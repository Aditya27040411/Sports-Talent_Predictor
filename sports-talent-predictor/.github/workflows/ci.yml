name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install scikit-learn pandas numpy matplotlib seaborn scipy joblib pytest

      - name: Train models
        run: python src/train.py

      - name: Run tests
        run: python -m pytest tests/ -v
